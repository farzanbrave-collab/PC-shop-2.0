<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فرم ثبت نام</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/app.css">
    <style>
        /* استایل‌های اضافی برای ظاهر بهتر */
        .card {
            border-radius: 10px;
        }

        .card-body {
            padding: 2rem;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control:focus {
            border-color: #0d6efd;
            /* رنگ آبی بوت استرپ */
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0b5ed7;
        }

        .link-login {
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">

                <div class="card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="text-center mb-4 text-primary fw-bold">ثبت نام</h1>

                        <form class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="fullName" class="form-label">نام و نام خانوادگی</label>
                                <input type="text" class="form-control" id="fullName" placeholder="مثلاً علی رضایی"
                                    required>
                                <div class="invalid-feedback">
                                    لطفاً نام و نام خانوادگی خود را وارد کنید.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">ایمیل</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com"
                                    required>
                                <div class="invalid-feedback">
                                    لطفاً یک آدرس ایمیل معتبر وارد کنید.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="mobile" class="form-label">شماره موبایل</label>
                                <!-- Pattern برای فرمت موبایل ایرانی (اختیاری، چون اعتبارسنجی دقیق پیچیده‌تر است) -->
                                <input type="tel" class="form-control" id="mobile" placeholder="09123456789"
                                    pattern="^09\d{9}$" required>
                                <div class="invalid-feedback">
                                    لطفاً شماره موبایل خود را با فرمت صحیح (مانند 09123456789) وارد کنید.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">رمز عبور</label>
                                <input type="password" class="form-control" id="password" placeholder="رمز عبور"
                                    minlength="8" required>
                                <div class="invalid-feedback">
                                    رمز عبور باید حداقل ۸ کاراکتر باشد.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">تکرار رمز عبور</label>
                                <input type="password" class="form-control" id="confirmPassword"
                                    placeholder="تکرار رمز عبور" required>
                                <div class="invalid-feedback">
                                    رمزهای عبور وارد شده مطابقت ندارند.
                                </div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    قوانین و شرایط را می‌پذیرم
                                </label>
                                <div class="invalid-feedback">
                                    شما باید قوانین و شرایط را بپذیرید.
                                </div>
                            </div>

                            <!-- لینک ورود -->
                            <div class="text-center mb-3 link-login">
                                حساب کاربری دارید؟ <a href="./login.html" class="text-decoration-none text-primary">وارد شوید</a>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                ثبت نام
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // اسکریپت جاوااسکریپت برای اعتبارسنجی فرم
        (() => {
            'use strict'

            // گرفتن تمام فرم‌هایی که باید اعتبارسنجی شوند
            const forms = document.querySelectorAll('.needs-validation')

            // حلقه زدن بر روی آن‌ها و اضافه کردن شنونده رویداد
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>


</html>
